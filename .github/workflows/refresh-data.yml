name: Refresh World Bank data

# Runs automatically every Monday, and can be triggered by hand from the Actions
# tab. Pulls the latest World Bank figures (internet %, population, income group)
# and commits them if anything changed. Governance scores are never touched.

on:
  schedule:
    - cron: "0 6 * * 1"   # every Monday at 06:00 UTC
  workflow_dispatch: {}     # manual "Run workflow" button

permissions:
  contents: write           # allow the action to commit the refreshed data

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh data from the World Bank API
        run: python scripts/refresh_world_bank.py

      - name: Validate JSON is still well-formed
        run: python -c "import json; json.load(open('data/countries.json'))"

      - name: Commit changes (if any)
        run: |
          if [ -n "$(git status --porcelain data/countries.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/countries.json
            git commit -m "chore(data): auto-refresh World Bank indicators"
            git push
            echo "Committed refreshed World Bank data."
          else
            echo "No changes — data already current."
          fi
